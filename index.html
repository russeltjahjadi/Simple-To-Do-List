<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tasky — Get things done</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --cream: #0f1117;
        --ink: #e8e3da;
        --warm-brown: #a89bc2;
        --accent: #7c6fcd;
        --accent-light: #252038;
        --muted: #4e5363;
        --line: #1e2130;
        --done-bg: #141720;
      }

      html {
        font-size: 16px;
      }

      body {
        background-color: var(--cream);
        color: var(--ink);
        font-family: "DM Sans", sans-serif;
        font-weight: 300;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 48px 16px 80px;
        position: relative;
        overflow-x: hidden;
      }

      /* Grain texture */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 1000;
        opacity: 0.5;
      }

      /* Decorative blobs */
      .blob {
        position: fixed;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.18;
        pointer-events: none;
      }
      .blob-1 {
        width: 400px;
        height: 400px;
        background: #5b4fbf;
        top: -100px;
        right: -100px;
      }
      .blob-2 {
        width: 300px;
        height: 300px;
        background: #2a1f5c;
        bottom: 50px;
        left: -80px;
      }

      /* Layout */
      .container {
        width: 100%;
        max-width: 560px;
        position: relative;
        z-index: 1;
      }

      /* Header */
      header {
        margin-bottom: 48px;
        animation: fadeUp 0.6s ease both;
      }
      .eyebrow {
        font-family: "DM Sans", sans-serif;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 6px;
        white-space: nowrap;
        font-size: clamp(42px, 8vw, 64px);
        font-weight: 300;
        line-height: 0.95;
        color: var(--ink);
      }
      h1 em {
        font-style: italic;
        color: var(--warm-brown);
      }
      .subtitle {
        margin-top: 14px;
        font-size: 14px;
        color: var(--muted);
        font-weight: 300;
      }

      /* Stats bar */
      .stats {
        display: flex;
        gap: 24px;
        margin-bottom: 32px;
        animation: fadeUp 0.6s 0.1s ease both;
      }
      .stat {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .stat-num {
        font-family: "Fraunces", serif;
        font-size: 28px;
        font-weight: 600;
        color: var(--ink);
        line-height: 1;
      }
      .stat-label {
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .stat-divider {
        width: 1px;
        background: var(--line);
        margin: 4px 0;
      }

      /* Input area */
      .input-area {
        margin-bottom: 28px;
        animation: fadeUp 0.6s 0.2s ease both;
      }
      .input-row {
        display: flex;
        align-items: center;
        gap: 0;
        background: #1a1e2a;
        border: 1.5px solid var(--line);
        border-radius: 14px;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        overflow: visible;
        position: relative;
      }
      .input-row:focus-within {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-light);
      }
      .task-input {
        flex: 1;
        background: transparent;
        border: none;
        border-radius: 14px;
        padding: 14px 12px 14px 18px;
        font-family: "DM Sans", sans-serif;
        font-size: 15px;
        font-weight: 300;
        color: var(--ink);
        outline: none;
        min-width: 0;
      }
      .task-input::placeholder {
        color: var(--muted);
      }

      /* Inline category picker */
      .cat-picker {
        position: relative;
        flex-shrink: 0;
        display: flex;
        align-items: center;
      }
      .cat-trigger {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 6px 10px;
        border-radius: 8px;
        border: 1.5px solid var(--line);
        background: #0f1117;
        font-family: "DM Sans", sans-serif;
        font-size: 12px;
        font-weight: 400;
        color: var(--muted);
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
        margin-right: 8px;
      }
      .cat-trigger:hover {
        border-color: var(--ink);
        color: var(--ink);
      }
      .cat-trigger.has-cat {
        border-color: var(--selected-cat-color, var(--ink));
        color: var(--selected-cat-color, var(--ink));
        background: #1a1e2a;
      }
      .cat-trigger-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--selected-cat-color, var(--muted));
        flex-shrink: 0;
      }
      .cat-trigger-chevron {
        font-size: 9px;
        opacity: 0.5;
        transition: transform 0.15s;
      }
      .cat-trigger.open .cat-trigger-chevron {
        transform: rotate(180deg);
      }

      /* Dropdown */
      .cat-dropdown {
        position: absolute;
        bottom: calc(100% + 8px);
        right: 0;
        background: #1a1e2a;
        border: 1.5px solid var(--line);
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        padding: 6px;
        display: none;
        flex-direction: column;
        gap: 2px;
        min-width: 148px;
        z-index: 100;
        animation: dropIn 0.15s ease both;
      }
      .cat-dropdown.open {
        display: flex;
      }
      .cat-dropdown-label {
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
        padding: 4px 10px 6px;
      }
      .cat-option {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 13px;
        color: var(--ink);
        font-family: "DM Sans", sans-serif;
        font-weight: 400;
        transition: background 0.1s;
        border: none;
        background: none;
        width: 100%;
        text-align: left;
      }
      .cat-option:hover {
        background: #0f1117;
      }
      .cat-option.selected {
        font-weight: 500;
      }
      .cat-option.selected::after {
        content: "✓";
        margin-left: auto;
        font-size: 11px;
        color: var(--muted);
      }
      .cat-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      /* Add button */
      .add-btn {
        padding: 10px 16px;
        background: var(--ink);
        color: var(--cream);
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-size: 20px;
        line-height: 1;
        transition:
          background 0.15s,
          transform 0.1s;
        flex-shrink: 0;
        margin: 4px 4px 4px 0;
      }
      .add-btn:hover {
        background: var(--accent);
      }
      .add-btn:active {
        transform: scale(0.95);
      }

      @keyframes dropIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Filter tabs */
      .filter-tabs {
        display: flex;
        gap: 0;
        margin-bottom: 16px;
        border-bottom: 1.5px solid var(--line);
        animation: fadeUp 0.6s 0.3s ease both;
      }
      .filter-tab {
        padding: 10px 16px;
        font-size: 13px;
        font-weight: 400;
        color: var(--muted);
        cursor: pointer;
        border: none;
        background: transparent;
        font-family: "DM Sans", sans-serif;
        position: relative;
        transition: color 0.15s;
        border-bottom: 2px solid transparent;
        margin-bottom: -1.5px;
      }
      .filter-tab:hover {
        color: var(--ink);
      }
      .filter-tab.active {
        color: var(--ink);
        font-weight: 500;
        border-bottom-color: var(--ink);
      }

      /* Task list */
      .task-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        animation: fadeUp 0.6s 0.35s ease both;
      }

      .empty-state {
        text-align: center;
        padding: 60px 0;
        color: var(--muted);
      }
      .empty-icon {
        font-size: 40px;
        margin-bottom: 12px;
        opacity: 0.5;
      }
      .empty-text {
        font-family: "Fraunces", serif;
        font-size: 20px;
        font-weight: 300;
        font-style: italic;
        color: var(--warm-brown);
      }
      .empty-sub {
        font-size: 13px;
        margin-top: 6px;
      }

      /* Task card */
      .task-card {
        background: #1a1e2a;
        border: 1.5px solid var(--line);
        border-radius: 14px;
        padding: 14px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
        transition:
          box-shadow 0.2s,
          border-color 0.2s,
          transform 0.2s,
          opacity 0.3s;
        animation: slideIn 0.25s ease both;
        position: relative;
        overflow: hidden;
      }
      .task-card:hover {
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        border-color: var(--accent-light);
        transform: translateY(-1px);
      }
      .task-card.done {
        background: var(--done-bg);
        border-color: var(--line);
      }
      .task-card.done:hover {
        transform: none;
        box-shadow: none;
      }

      /* Category accent line */
      .task-card::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        border-radius: 2px 0 0 2px;
        background: var(--cat-color, transparent);
      }

      /* Checkbox */
      .task-check {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 2px solid #4a5170;
        flex-shrink: 0;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          border-color 0.2s,
          background 0.2s,
          box-shadow 0.2s;
        font-size: 11px;
        color: white;
        background: #12151f;
      }
      .task-check:hover {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-light);
      }
      .task-card.done .task-check {
        background: var(--accent);
        border-color: var(--accent);
      }

      /* Task body */
      .task-body {
        flex: 1;
        min-width: 0;
      }
      .task-text {
        font-size: 15px;
        font-weight: 400;
        color: var(--ink);
        transition: color 0.2s;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .task-card.done .task-text {
        text-decoration: line-through;
        color: var(--muted);
      }
      .task-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 3px;
      }
      .task-cat-label {
        font-size: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .task-time {
        font-size: 10px;
        color: var(--muted);
      }

      /* Delete button */
      .task-delete {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        border: none;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        font-size: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        opacity: 0;
        transition:
          opacity 0.15s,
          background 0.15s,
          color 0.15s;
      }
      .task-card:hover .task-delete {
        opacity: 1;
      }
      .task-delete:hover {
        background: #2a1f3d;
        color: var(--accent);
      }

      /* Clear completed */
      .clear-btn {
        display: block;
        margin: 20px auto 0;
        font-size: 12px;
        color: var(--muted);
        background: none;
        border: none;
        cursor: pointer;
        font-family: "DM Sans", sans-serif;
        text-decoration: underline;
        transition: color 0.15s;
      }
      .clear-btn:hover {
        color: var(--accent);
      }

      /* Animations */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(-12px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      .removing {
        opacity: 0 !important;
        transform: translateX(20px) !important;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">
      <header>
        <div class="eyebrow">✦ Workspace</div>
        <h1>Get things<br /><em>done.</em></h1>
        <p class="subtitle">A quiet place for your tasks.</p>
      </header>

      <div class="stats">
        <div class="stat">
          <span class="stat-num" id="stat-total">0</span>
          <span class="stat-label">Total</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span class="stat-num" id="stat-left">0</span>
          <span class="stat-label">Remaining</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span class="stat-num" id="stat-done">0</span>
          <span class="stat-label">Completed</span>
        </div>
      </div>

      <div class="input-area">
        <div class="input-row" id="input-row">
          <input
            class="task-input"
            id="task-input"
            type="text"
            placeholder="What needs to be done?"
            maxlength="120"
          />
          <div class="cat-picker" id="cat-picker">
            <button class="cat-trigger" id="cat-trigger" type="button">
              <span class="cat-trigger-dot" id="cat-trigger-dot"></span>
              <span id="cat-trigger-label">Tag</span>
              <span class="cat-trigger-chevron">▼</span>
            </button>
            <div class="cat-dropdown" id="cat-dropdown">
              <div class="cat-dropdown-label">Category</div>
              <button class="cat-option selected" data-cat="none">
                <span class="cat-dot" style="background: #2e3347"></span>None
              </button>
              <button class="cat-option" data-cat="work">
                <span class="cat-dot" style="background: #d4622a"></span>Work
              </button>
              <button class="cat-option" data-cat="personal">
                <span class="cat-dot" style="background: #7c5c3e"></span
                >Personal
              </button>
              <button class="cat-option" data-cat="health">
                <span class="cat-dot" style="background: #5e8b6e"></span>Health
              </button>
              <button class="cat-option" data-cat="ideas">
                <span class="cat-dot" style="background: #9b6fb5"></span>Ideas
              </button>
            </div>
          </div>
          <button class="add-btn" id="add-btn" title="Add task">+</button>
        </div>
      </div>

      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all">All</button>
        <button class="filter-tab" data-filter="active">Active</button>
        <button class="filter-tab" data-filter="done">Done</button>
      </div>

      <div class="task-list" id="task-list"></div>
      <button class="clear-btn" id="clear-btn" style="display: none">
        Clear completed
      </button>
    </div>

    <script>
      const CAT_COLORS = {
        work: "#D4622A",
        personal: "#7C5C3E",
        health: "#5E8B6E",
        ideas: "#9B6FB5",
        none: "transparent",
      };
      const CAT_LABELS = {
        work: "Work",
        personal: "Personal",
        health: "Health",
        ideas: "Ideas",
      };

      let tasks = JSON.parse(localStorage.getItem("tasky_tasks") || "[]");
      let selectedCat = "none";
      let activeFilter = "all";
      let dropdownOpen = false;

      function save() {
        localStorage.setItem("tasky_tasks", JSON.stringify(tasks));
      }

      function formatTime(ts) {
        const d = new Date(ts);
        return (
          d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) +
          " · " +
          d.toLocaleDateString([], { month: "short", day: "numeric" })
        );
      }

      // Category picker
      const trigger = document.getElementById("cat-trigger");
      const dropdown = document.getElementById("cat-dropdown");
      const triggerDot = document.getElementById("cat-trigger-dot");
      const triggerLabel = document.getElementById("cat-trigger-label");

      function setCat(cat) {
        selectedCat = cat;
        const color = CAT_COLORS[cat] || "transparent";
        const label = CAT_LABELS[cat] || "Tag";
        triggerLabel.textContent = label;
        triggerDot.style.background = cat === "none" ? "#2E3347" : color;
        trigger.style.setProperty(
          "--selected-cat-color",
          cat === "none" ? "" : color,
        );
        trigger.classList.toggle("has-cat", cat !== "none");
        document.querySelectorAll(".cat-option").forEach((o) => {
          o.classList.toggle("selected", o.dataset.cat === cat);
        });
        closeDropdown();
      }

      function openDropdown() {
        dropdownOpen = true;
        dropdown.classList.add("open");
        trigger.classList.add("open");
      }
      function closeDropdown() {
        dropdownOpen = false;
        dropdown.classList.remove("open");
        trigger.classList.remove("open");
      }

      trigger.addEventListener("click", (e) => {
        e.stopPropagation();
        dropdownOpen ? closeDropdown() : openDropdown();
      });
      document.querySelectorAll(".cat-option").forEach((opt) => {
        opt.addEventListener("click", (e) => {
          e.stopPropagation();
          setCat(opt.dataset.cat);
        });
      });
      document.addEventListener("click", () => closeDropdown());

      function render() {
        const list = document.getElementById("task-list");
        const clearBtn = document.getElementById("clear-btn");

        let visible = tasks.filter((t) => {
          if (activeFilter === "active") return !t.done;
          if (activeFilter === "done") return t.done;
          return true;
        });

        list.innerHTML = "";

        if (visible.length === 0) {
          const msgs = {
            all: ["Nothing here yet", "Add your first task above"],
            active: ["All caught up!", "No active tasks remaining"],
            done: ["Nothing completed yet", "Finish a task to see it here"],
          };
          const [title, sub] = msgs[activeFilter];
          list.innerHTML = `<div class="empty-state"><div class="empty-icon">◎</div><div class="empty-text">${title}</div><div class="empty-sub">${sub}</div></div>`;
        } else {
          visible.forEach((task) => {
            const card = document.createElement("div");
            card.className = "task-card" + (task.done ? " done" : "");
            card.dataset.id = task.id;
            const catColor = CAT_COLORS[task.cat] || "transparent";
            card.style.setProperty("--cat-color", catColor);

            const catLabel =
              task.cat && task.cat !== "none"
                ? `<span class="task-cat-label">${CAT_LABELS[task.cat] || ""}</span><span style="color:var(--line);font-size:10px">·</span>`
                : "";

            card.innerHTML = `
        <div class="task-check" onclick="toggleTask('${task.id}')">${task.done ? "✓" : ""}</div>
        <div class="task-body">
          <div class="task-text">${escHtml(task.text)}</div>
          <div class="task-meta">${catLabel}<span class="task-time">${formatTime(task.ts)}</span></div>
        </div>
        <button class="task-delete" onclick="deleteTask('${task.id}')" title="Delete">✕</button>
      `;
            list.appendChild(card);
          });
        }

        document.getElementById("stat-total").textContent = tasks.length;
        document.getElementById("stat-left").textContent = tasks.filter(
          (t) => !t.done,
        ).length;
        document.getElementById("stat-done").textContent = tasks.filter(
          (t) => t.done,
        ).length;
        clearBtn.style.display = tasks.some((t) => t.done) ? "block" : "none";
      }

      function escHtml(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function addTask() {
        const input = document.getElementById("task-input");
        const text = input.value.trim();
        if (!text) {
          input.focus();
          return;
        }
        tasks.unshift({
          id: Date.now().toString(),
          text,
          done: false,
          cat: selectedCat,
          ts: Date.now(),
        });
        save();
        input.value = "";
        setCat("none");
        input.focus();
        render();
      }

      function toggleTask(id) {
        const t = tasks.find((t) => t.id === id);
        if (t) {
          t.done = !t.done;
          save();
          render();
        }
      }

      function deleteTask(id) {
        const card = document.querySelector(`.task-card[data-id="${id}"]`);
        if (card) {
          card.classList.add("removing");
          setTimeout(() => {
            tasks = tasks.filter((t) => t.id !== id);
            save();
            render();
          }, 280);
        }
      }

      document.getElementById("add-btn").addEventListener("click", addTask);
      document.getElementById("task-input").addEventListener("keydown", (e) => {
        if (e.key === "Enter") addTask();
      });

      document.querySelectorAll(".filter-tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          activeFilter = tab.dataset.filter;
          document
            .querySelectorAll(".filter-tab")
            .forEach((t) => t.classList.toggle("active", t === tab));
          render();
        });
      });

      document.getElementById("clear-btn").addEventListener("click", () => {
        tasks = tasks.filter((t) => !t.done);
        save();
        render();
      });

      render();
    </script>
  </body>
</html>
